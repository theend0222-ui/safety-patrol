<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="安全パトロール">
<meta name="theme-color" content="#1a1a1a">
<title>安全パトロールチェックシート</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:rgba(0,0,0,0.1)}
button{cursor:pointer;touch-action:manipulation;-webkit-touch-callout:none;user-select:none;-webkit-user-select:none}
:root{
  --black:#1a1a1a;--white:#ffffff;--bg:#f0f0ec;--card:#ffffff;
  --border:#ddddd8;--border-light:#eeede8;
  --label-bg:#f4f4f0;--alt:#fafaf8;
  --ok:#2a7a2a;--ok-bg:#e8f5e9;--ok-light:#f4fff4;
  --ng:#c0392b;--ng-bg:#fdecea;--ng-light:#fff8f6;
  --na:#888888;--na-bg:#f5f5f5;
  --accent:#e85a30;--accent-light:#fff3ef;
  --blue:#1565c0;
  --radius:10px;--radius-sm:6px;
}
html{font-size:16px}
body{font-family:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',Arial,sans-serif;
  color:var(--black);background:var(--bg);min-height:100vh;padding-bottom:80px}

/* ===== ヘッダー ===== */
.hdr{background:var(--black);color:#fff;padding:12px 16px;
  position:sticky;top:0;z-index:300;
  display:flex;align-items:center;justify-content:space-between;gap:8px}
.hdr-title{font-size:14px;font-weight:700;letter-spacing:.02em;line-height:1.3}
.hdr-sub{font-size:10px;color:#aaa;margin-top:1px}
.offline-badge{font-size:10px;padding:3px 8px;border-radius:12px;
  background:#2a7a2a;color:#fff;white-space:nowrap;flex-shrink:0}
.offline-badge.offline{background:#e85a30}

/* ===== タブナビ ===== */
.tab-nav{display:flex;background:var(--black);border-top:1px solid #333;position:sticky;top:56px;z-index:290}
.tab-btn{flex:1;padding:10px 4px;font-size:12px;font-weight:600;color:#888;
  border:none;background:transparent;cursor:pointer;font-family:inherit;
  border-bottom:3px solid transparent;transition:all .15s;letter-spacing:.02em}
.tab-btn.active{color:#fff;border-bottom-color:#fff}

/* ===== コンテナ ===== */
.tab-content{display:none;padding:12px}
.tab-content.active{display:block}

/* ===== パネル ===== */
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.panel-hd{background:var(--black);color:#fff;padding:10px 14px;font-size:13px;font-weight:700;letter-spacing:.03em}
.panel-hd.orange{background:var(--accent)}
.panel-hd.green{background:var(--ok)}

/* ===== 工事情報フォーム ===== */
.field{border-bottom:1px solid var(--border-light)}
.field:last-child{border-bottom:none}
.field-inner{display:flex;align-items:stretch;min-height:48px}
.field-label{width:36%;background:var(--label-bg);padding:12px 12px;
  font-size:12px;font-weight:600;color:#666;display:flex;align-items:center;
  border-right:1px solid var(--border-light);flex-shrink:0;line-height:1.3}
.field-input{flex:1;padding:10px 12px;display:flex;align-items:center}
.field-input input,.field-input select,.field-input textarea{
  width:100%;border:none;font-size:14px;font-family:inherit;
  color:var(--black);background:transparent;outline:none;line-height:1.5}
.field-input textarea{resize:none;min-height:48px;padding-top:2px}
.field-input input[type=number]{-moz-appearance:textfield}
.field-input input[type=number]::-webkit-outer-spin-button,
.field-input input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.field-unit{font-size:13px;color:#999;padding-right:4px;white-space:nowrap;align-self:center}
.field-row2{display:grid;grid-template-columns:1fr 1fr}
.field-row2 .field{border-right:1px solid var(--border-light)}
.field-row2 .field:last-child{border-right:none;border-bottom:none}
.field-row2 .field:nth-last-child(2){border-bottom:none}

/* ===== 工事管理 ===== */
.proj-list{padding:8px}
.proj-item{display:flex;align-items:center;gap:8px;padding:12px;
  background:var(--alt);border:1px solid var(--border);border-radius:var(--radius-sm);
  margin-bottom:8px;cursor:pointer;transition:all .1s}
.proj-item:active{background:#e8e8e4}
.proj-item.current{background:#e8f0fe;border-color:var(--blue)}
.proj-info{flex:1;min-width:0}
.proj-name{font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.proj-meta{font-size:11px;color:#999;margin-top:2px}
.proj-badge{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--blue);color:#fff;white-space:nowrap;flex-shrink:0}
.proj-badge.done{background:var(--ok)}
.new-proj-btn{width:100%;padding:14px;border:2px dashed var(--border);border-radius:var(--radius-sm);
  background:transparent;font-size:14px;font-weight:600;color:#999;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s}
.new-proj-btn:active{background:var(--label-bg)}

/* ===== 工種・フィルター ===== */
.tag-area{padding:10px 12px}
.tag-sub{font-size:11px;color:#999;margin-bottom:6px;font-weight:700;letter-spacing:.05em}
.tag-grid{display:flex;flex-wrap:wrap;gap:6px}
.tag-btn{padding:8px 14px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--label-bg);color:#666;cursor:pointer;font-size:13px;
  font-family:inherit;font-weight:600;min-height:44px;transition:all .12s;
  touch-action:manipulation;user-select:none;-webkit-user-select:none}
.tag-btn.active{background:var(--black);border-color:var(--black);color:#fff}
.filter-row{display:flex;flex-wrap:wrap;gap:8px;padding:10px 12px}
.filter-sel{flex:1;min-width:140px;padding:9px 12px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--label-bg);color:var(--black);
  font-size:13px;font-family:inherit;min-height:42px}

/* ===== 統計バー ===== */
.stats{display:flex;gap:6px;padding:0 0 10px}
.stat{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:8px 4px;text-align:center}
.stat-v{font-size:22px;font-weight:700;line-height:1}
.stat-l{font-size:10px;color:#999;margin-top:2px}
.stat-v.ok{color:var(--ok)}
.stat-v.ng{color:var(--ng)}
.stat-v.na{color:var(--na)}

/* ===== アクションボタン ===== */
.act-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.act-btn{padding:13px 8px;border-radius:var(--radius-sm);border:1.5px solid var(--border);
  background:var(--card);color:var(--black);font-size:13px;font-weight:700;
  font-family:inherit;text-align:center;cursor:pointer;min-height:48px;transition:all .1s}
.act-btn:active{transform:scale(.97)}
.act-btn.primary{background:var(--black);border-color:var(--black);color:#fff}
.act-btn.danger{border-color:var(--ng);color:var(--ng)}
.act-btn.success{border-color:var(--ok);color:var(--ok)}
.act-btn.warn{border-color:var(--accent);color:var(--accent)}
.act-btn.active-filter{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}
.act-btn.active-filter-ng{background:var(--ng-bg);border-color:var(--ng);color:var(--ng)}

/* ===== セクション ===== */
.sec-hd{background:var(--label-bg);border-left:4px solid var(--black);
  padding:9px 12px;font-size:13px;font-weight:700;
  display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.sec-prog{font-size:11px;font-weight:400;display:flex;gap:8px}
.sec-prog span{padding:1px 7px;border-radius:10px;font-weight:600}
.sec-prog .p-ok{background:var(--ok-bg);color:var(--ok)}
.sec-prog .p-ng{background:var(--ng-bg);color:var(--ng)}
.timing-hd{font-size:11px;color:#aaa;padding:7px 12px 3px;
  font-weight:700;letter-spacing:.06em;background:var(--alt)}

/* ===== チェックカード ===== */
.check-card{border-bottom:1px solid var(--border-light);padding:12px;transition:background .15s}
.check-card:last-child{border-bottom:none}
.check-card.is-ok{background:var(--ok-light)}
.check-card.is-ng{background:var(--ng-light)}
.check-card.is-na{background:var(--na-bg)}

.card-top{display:flex;align-items:flex-start;gap:10px}
.status-icon{width:28px;height:28px;border-radius:var(--radius-sm);border:2px solid var(--border);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;background:#fff}
.status-icon.ok{background:var(--ok);border-color:var(--ok);color:#fff;font-size:16px;font-weight:700}
.status-icon.ng{background:var(--ng);border-color:var(--ng);color:#fff;font-size:16px;font-weight:700}
.status-icon.na{background:var(--na);border-color:var(--na);color:#fff;font-size:13px;font-weight:700}

.card-body{flex:1;min-width:0}
.card-no{font-size:10px;color:#bbb;font-family:monospace;margin-bottom:2px}
.card-text{font-size:14px;line-height:1.6;color:var(--black)}
.card-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag-h{background:#fdecea;color:#b71c1c}
.tag-m{background:#fff8e1;color:#e65100}
.tag-t{background:var(--label-bg);color:#666}

/* 3択ボタン */
.choice-row{display:flex;gap:6px;margin-top:10px}
.choice-btn{flex:1;padding:10px 4px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--label-bg);
  font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;
  text-align:center;min-height:44px;transition:all .12s;color:#888}
.choice-btn:active{transform:scale(.96)}
.choice-btn.sel-ok{background:var(--ok);border-color:var(--ok);color:#fff}
.choice-btn.sel-ng{background:var(--ng);border-color:var(--ng);color:#fff}
.choice-btn.sel-na{background:var(--na);border-color:var(--na);color:#fff}

/* NG詳細 */
.ng-box{margin-top:10px;padding:10px;background:var(--ng-bg);border-radius:var(--radius-sm);border:1px solid #f5c6c6}
.ng-box-label{font-size:11px;font-weight:700;color:var(--ng);margin-bottom:6px}
.ng-textarea{width:100%;border:1px solid #f5c6c6;border-radius:var(--radius-sm);
  padding:8px 10px;font-size:13px;font-family:inherit;resize:none;min-height:64px;
  background:#fff;color:var(--black);line-height:1.5}
.ng-textarea:focus{outline:none;border-color:var(--ng)}

/* 改善記録 */
.fix-box{margin-top:8px;padding:10px;background:var(--ok-bg);border-radius:var(--radius-sm);border:1px solid #c8e6c9}
.fix-box-label{font-size:11px;font-weight:700;color:var(--ok);margin-bottom:6px}
.fix-row{display:flex;gap:8px;align-items:center}
.fix-date{flex:1;border:1px solid #c8e6c9;border-radius:var(--radius-sm);
  padding:8px 10px;font-size:13px;font-family:inherit;background:#fff;color:var(--black)}
.fix-date:focus{outline:none;border-color:var(--ok)}
.fix-done{background:var(--ok);color:#fff;font-size:11px;font-weight:700;
  padding:4px 12px;border-radius:10px;white-space:nowrap;flex-shrink:0}

/* NG一覧タブ */
.ng-summary-card{background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);margin-bottom:8px;overflow:hidden}
.ng-s-hd{padding:10px 12px;background:var(--ng-bg);border-bottom:1px solid #f5c6c6;
  display:flex;align-items:center;gap:8px}
.ng-s-no{font-size:11px;color:var(--ng);font-family:monospace;font-weight:700}
.ng-s-text{font-size:13px;font-weight:600;flex:1}
.ng-s-body{padding:10px 12px}
.ng-s-note{font-size:13px;color:#555;line-height:1.5;margin-bottom:8px}
.ng-s-fix{font-size:12px;display:flex;align-items:center;gap:6px}
.ng-empty{text-align:center;padding:3rem 1rem;color:#999;font-size:14px}

/* 空状態 */
.empty{text-align:center;padding:3rem 1rem;color:#999;font-size:14px;line-height:1.8;background:var(--card);border-radius:var(--radius)}

/* トースト */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--black);color:#fff;padding:10px 20px;border-radius:20px;
  font-size:13px;font-weight:600;z-index:999;pointer-events:none;
  opacity:0;transition:opacity .3s;white-space:nowrap}
.toast.show{opacity:1}

/* フッター */
.footer-note{text-align:center;font-size:10px;color:#bbb;padding:8px;margin-top:4px}

@media print{
  @page{margin:10mm;size:A4}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  body{background:#fff;padding-bottom:0;font-size:11px}
  .tab-nav,.act-grid,.choice-row,.filter-row,.tag-area,.stats,.new-proj-btn,#tab-select,#btn-ng-only,#btn-unchecked{display:none!important}
  .hdr{position:relative!important;padding:8px 12px;background:#1a1a1a!important;color:#fff!important}
  .hdr-title{font-size:14px!important}
  .offline-badge{display:none!important}
  .tab-content{display:block!important;padding:4px 0!important}
  #tab-check{page-break-before:always}
  #tab-ng{page-break-before:always}
  .panel{border:1px solid #ccc!important;margin-bottom:6px!important;page-break-inside:avoid}
  .panel-hd{padding:6px 10px!important;font-size:11px!important;background:#1a1a1a!important;color:#fff!important}
  .panel-hd.orange{background:#e85a30!important;color:#fff!important}
  .field-inner{min-height:26px!important}
  .field-label{padding:4px 8px!important;font-size:10px!important;background:#f4f4f0!important}
  .field-input{padding:4px 8px!important}
  .field-input input,.field-input select,.field-input textarea{font-size:11px!important}
  .sec-hd{background:#f0f0f0!important;padding:6px 10px!important;font-size:11px!important;margin-top:4px!important;border-left:4px solid #1a1a1a!important}
  .sec-prog .p-ok{background:#e8f5e9!important;color:#2a7a2a!important}
  .sec-prog .p-ng{background:#fdecea!important;color:#c0392b!important}
  .timing-hd{padding:4px 10px 2px!important;font-size:10px!important;background:#fafaf8!important}
  .check-card{padding:6px 10px!important;page-break-inside:avoid}
  .check-card.is-ok{background:#f4fff4!important}
  .check-card.is-ng{background:#fff8f6!important}
  .check-card.is-na{background:#f5f5f5!important}
  .status-icon{width:20px!important;height:20px!important;font-size:12px!important;border:1.5px solid #999!important}
  .status-icon.ok{background:#2a7a2a!important;border-color:#2a7a2a!important;color:#fff!important}
  .status-icon.ng{background:#c0392b!important;border-color:#c0392b!important;color:#fff!important}
  .status-icon.na{background:#888!important;border-color:#888!important;color:#fff!important}
  .card-no{font-size:9px!important}
  .card-text{font-size:11px!important;line-height:1.4!important}
  .tag{font-size:9px!important;padding:1px 5px!important}
  .tag-h{background:#fdecea!important;color:#b71c1c!important}
  .tag-m{background:#fff8e1!important;color:#e65100!important}
  .tag-t{background:#f0f0ec!important;color:#666!important}
  .ng-box{background:#fdecea!important;border:1px solid #f5c6c6!important;padding:6px 8px!important;margin-top:6px!important}
  .ng-box-label{font-size:9px!important;color:#c0392b!important}
  .ng-textarea{border:none!important;background:transparent!important;font-size:11px!important;min-height:auto!important;padding:2px 0!important}
  .fix-box{background:#e8f5e9!important;border:1px solid #c8e6c9!important;padding:6px 8px!important;margin-top:4px!important}
  .fix-box-label{font-size:9px!important;color:#2a7a2a!important}
  .fix-date{border:none!important;background:transparent!important;font-size:11px!important}
  .fix-done{background:#2a7a2a!important;color:#fff!important}
  .ng-summary-card{border:1px solid #f5c6c6!important;margin-bottom:6px!important;page-break-inside:avoid}
  .ng-s-hd{background:#fdecea!important;padding:6px 10px!important}
  .ng-s-text{font-size:11px!important}
  .ng-s-body{padding:6px 10px!important}
  .ng-s-note{font-size:11px!important}
}
</style>
</head>
<body>

<!-- ヘッダー -->
<div class="hdr">
  <div>
    <div class="hdr-title">安全パトロールチェックシート</div>
    <div class="hdr-sub">建設業労働災害防止協会 基準準拠</div>
  </div>
  <div class="offline-badge" id="online-badge">● オンライン</div>
</div>

<!-- タブ -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="showTab('tab-info')">工事情報</button>
  <button class="tab-btn" onclick="showTab('tab-select')">工種選択</button>
  <button class="tab-btn" onclick="showTab('tab-check')">チェック</button>
  <button class="tab-btn" onclick="showTab('tab-ng')">NG一覧</button>
</div>

<!-- ===== タブ1: 工事情報 ===== -->
<div class="tab-content active" id="tab-info">

  <!-- 工事選択 -->
  <div class="panel">
    <div class="panel-hd">■ 工事を選択 / 新規作成</div>
    <div class="proj-list" id="proj-list"></div>
    <div style="padding:0 8px 8px">
      <button class="new-proj-btn" onclick="newProject()">＋ 新しい工事を追加</button>
    </div>
  </div>

  <!-- 工事情報入力 -->
  <div class="panel" id="info-panel">
    <div class="panel-hd">■ 工事情報（現在の工事）</div>

    <div class="field">
      <div class="field-inner">
        <div class="field-label">工事名称</div>
        <div class="field-input"><input id="i-name" type="text" placeholder="○○新築工事" oninput="saveInfo()"></div>
      </div>
    </div>
    <div class="field">
      <div class="field-inner">
        <div class="field-label">工事場所</div>
        <div class="field-input"><input id="i-loc" type="text" placeholder="大阪府○○市" oninput="saveInfo()"></div>
      </div>
    </div>
    <div class="field">
      <div class="field-inner">
        <div class="field-label">パトロール日</div>
        <div class="field-input"><input id="i-date" type="date" oninput="saveInfo()"></div>
      </div>
    </div>
    <div class="field">
      <div class="field-inner">
        <div class="field-label">作成者</div>
        <div class="field-input"><input id="i-author" type="text" placeholder="氏名" oninput="saveInfo()"></div>
      </div>
    </div>
    <div class="field">
      <div class="field-inner">
        <div class="field-label">パトロール員</div>
        <div class="field-input"><input id="i-patrol" type="text" placeholder="例：田中・鈴木・佐藤" oninput="saveInfo()"></div>
      </div>
    </div>
    <div class="field">
      <div class="field-inner">
        <div class="field-label">当日の工事内容</div>
        <div class="field-input"><textarea id="i-work" placeholder="例：2階スラブ型枠組立、鉄筋配筋" rows="2" oninput="saveInfo()"></textarea></div>
      </div>
    </div>

    <div class="field-row2">
      <div class="field">
        <div class="field-inner">
          <div class="field-label" style="width:50%">作業員人数</div>
          <div class="field-input">
            <input id="i-workers" type="number" placeholder="0" min="0" oninput="saveInfo()" style="width:60px">
            <span class="field-unit">名</span>
          </div>
        </div>
      </div>
      <div class="field">
        <div class="field-inner">
          <div class="field-label" style="width:50%">進捗率</div>
          <div class="field-input">
            <input id="i-progress" type="number" placeholder="0" min="0" max="100" oninput="saveInfo()" style="width:60px">
            <span class="field-unit">％</span>
          </div>
        </div>
      </div>
    </div>

    <div class="field-row2">
      <div class="field" style="border-bottom:none">
        <div class="field-inner">
          <div class="field-label" style="width:50%">天気</div>
          <div class="field-input">
            <select id="i-weather" onchange="saveInfo()">
              <option value="">選択</option>
              <option>晴れ</option><option>曇り</option><option>雨</option>
              <option>雪</option><option>晴れ時々曇り</option><option>曇り時々雨</option>
            </select>
          </div>
        </div>
      </div>
      <div class="field" style="border-bottom:none;border-right:none">
        <div class="field-inner">
          <div class="field-label" style="width:50%">気温</div>
          <div class="field-input">
            <input id="i-temp" type="number" placeholder="25" oninput="saveInfo()" style="width:60px">
            <span class="field-unit">℃</span>
          </div>
        </div>
      </div>
    </div>

  </div>

  <div class="act-grid">
    <button class="act-btn primary" onclick="showTab('tab-select')">工種を選択 →</button>
    <button class="act-btn success" onclick="exportExcel()">📊 Excel出力</button>
  </div>

// app.currentProjectId = id

let app = loadApp();
if(!app.projects) app.projects=[];
if(!app.currentProjectId && app.projects.length>0) app.currentProjectId=app.projects[0].id;

function currentProject(){
  return app.projects.find(p=>p.id===app.currentProjectId)||null;
}
function saveState(){ saveApp(app); }

// ========== UI状態 ==========
let showNgOnly=false, showUnchecked=false;

// ========== 初期化 ==========
function init(){
  // Service Worker 登録
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
  // オンライン状態
  function updateOnline(){
    const b=document.getElementById('online-badge');
    if(navigator.onLine){ b.textContent='● オンライン'; b.className='offline-badge'; }
    else{ b.textContent='● オフライン'; b.className='offline-badge offline'; }
  }
  window.addEventListener('online',updateOnline);
  window.addEventListener('offline',updateOnline);
  updateOnline();

  // 工種タグ
  const mc=document.getElementById('major-tags');
  Object.keys(MAJOR_MINOR).forEach(m=>{
    const b=document.createElement('button');
    b.className='tag-btn'; b.textContent=m; b.dataset.major=m;
    b.addEventListener('click',()=>toggleMajor(m,b));
    b.addEventListener('touchend',e=>{e.preventDefault();toggleMajor(m,b);});
    mc.appendChild(b);
  });
  // 事故分類
  const af=document.getElementById('f-accident');
  ACCIDENTS.forEach(a=>{const o=document.createElement('option');o.value=a;o.textContent=a;af.appendChild(o);});
  ['f-timing','f-imp','f-target','f-accident'].forEach(id=>{
    document.getElementById(id).addEventListener('change',renderChecklist);
  });

  renderProjectList();
  loadCurrentProject();
}

// ========== プロジェクト管理 ==========
function renderProjectList(){
  const el=document.getElementById('proj-list');
  if(!app.projects.length){
    el.innerHTML='<p style="padding:12px;font-size:13px;color:#999">工事がまだ登録されていません</p>';
    return;
  }
  el.innerHTML=app.projects.map(p=>{
    const isCur=p.id===app.currentProjectId;
    const ngCount=Object.values(p.itemState||{}).filter(s=>s.status==='ng').length;
    return `<div class="proj-item${isCur?' current':''}" onclick="switchProject('${p.id}')" ontouchend="event.preventDefault();switchProject('${p.id}')">
      <div class="proj-info">
        <div class="proj-name">${escHtml(p.info?.name||'（工事名未入力）')}</div>
        <div class="proj-meta">${escHtml(p.info?.loc||'')} ${p.info?.date||''}</div>
      </div>
      ${ngCount>0?`<span class="proj-badge">NG:${ngCount}</span>`:''}
      ${isCur?'<span class="proj-badge done">選択中</span>':''}
    </div>`;
  }).join('');
}

function newProject(){
  const id='proj_'+Date.now();
  const today=new Date().toISOString().split('T')[0];
  app.projects.unshift({id, createdAt:today, info:{date:today}, selMajors:[], selMinors:[], itemState:{}});
  app.currentProjectId=id;
  saveState();
  renderProjectList();
  loadCurrentProject();
  showTab('tab-info');
  showToast('新しい工事を作成しました');
}

function switchProject(id){
  app.currentProjectId=id;
  saveState();
  renderProjectList();
  loadCurrentProject();
  showToast('工事を切り替えました');
}

function loadCurrentProject(){
  const p=currentProject();
  if(!p){ clearInfoForm(); return; }
  const info=p.info||{};
  document.getElementById('i-name').value=info.name||'';
  document.getElementById('i-loc').value=info.loc||'';
  document.getElementById('i-date').value=info.date||'';
  document.getElementById('i-author').value=info.author||'';
  document.getElementById('i-patrol').value=info.patrol||'';
  document.getElementById('i-work').value=info.work||'';
  document.getElementById('i-workers').value=info.workers||'';
  document.getElementById('i-progress').value=info.progress||'';
  document.getElementById('i-weather').value=info.weather||'';
  document.getElementById('i-temp').value=info.temp||'';

  // 工種選択の復元
  const selMajors=new Set(p.selMajors||[]);
  document.querySelectorAll('#major-tags .tag-btn').forEach(b=>{
    b.classList.toggle('active', selMajors.has(b.dataset.major));
  });
  updateMinorTags();
  const selMinors=new Set(p.selMinors||[]);
  document.querySelectorAll('#minor-tags .tag-btn').forEach(b=>{
    b.classList.toggle('active', selMinors.has(b.dataset.minor));
  });

  renderChecklist();
  renderNgList();
}

function clearInfoForm(){
  ['i-name','i-loc','i-date','i-author','i-work','i-workers','i-progress','i-temp'].forEach(id=>{
    document.getElementById(id).value='';
  });
  document.getElementById('i-weather').value='';
}

function saveInfo(){
  const p=currentProject(); if(!p) return;
  p.info={
    name:document.getElementById('i-name').value,
    loc:document.getElementById('i-loc').value,
    date:document.getElementById('i-date').value,
    author:document.getElementById('i-author').value,
    patrol:document.getElementById('i-patrol').value,
    work:document.getElementById('i-work').value,
    workers:document.getElementById('i-workers').value,
    progress:document.getElementById('i-progress').value,
    weather:document.getElementById('i-weather').value,
    temp:document.getElementById('i-temp').value
  };
  // プロジェクトリストの名称更新
  renderProjectList();
  saveState();
}

// ========== 工種選択 ==========
function getSelMajors(){
  const p=currentProject(); return new Set(p?.selMajors||[]);
}
function getSelMinors(){
  const p=currentProject(); return new Set(p?.selMinors||[]);
}

function toggleMajor(m,btn){
  const p=currentProject(); if(!p) return;
  if(!p.selMajors) p.selMajors=[];
  const idx=p.selMajors.indexOf(m);
  if(idx>=0){ p.selMajors.splice(idx,1); btn.classList.remove('active'); }
  else{ p.selMajors.push(m); btn.classList.add('active'); }
  updateMinorTags();
  saveState();
  renderChecklist();
}
function updateMinorTags(){
  const c=document.getElementById('minor-tags'); c.innerHTML='';
  const selMajors=getSelMajors();
  if(!selMajors.size){
    c.innerHTML='<span style="font-size:13px;color:#bbb;padding:4px">← まず大分類を選んでください</span>';
    return;
  }
  let minors=[];
  selMajors.forEach(m=>{ (MAJOR_MINOR[m]||[]).forEach(mn=>{ if(!minors.includes(mn)) minors.push(mn); }); });
  const selMinors=getSelMinors();
  minors.forEach(mn=>{
    const b=document.createElement('button');
    b.className='tag-btn'+(selMinors.has(mn)?' active':'');
    b.textContent=mn; b.dataset.minor=mn;
    b.addEventListener('click',()=>toggleMinor(mn,b));
    b.addEventListener('touchend',e=>{e.preventDefault();toggleMinor(mn,b);});
    c.appendChild(b);
  });
}
function toggleMinor(mn,btn){
  const p=currentProject(); if(!p) return;
  if(!p.selMinors) p.selMinors=[];
  const idx=p.selMinors.indexOf(mn);
  if(idx>=0){ p.selMinors.splice(idx,1); btn.classList.remove('active'); }
  else{ p.selMinors.push(mn); btn.classList.add('active'); }
  saveState();
  renderChecklist();
}

// ========== チェック状態 ==========
function getItemState(no){
  const p=currentProject(); if(!p) return {status:null,ngNote:'',fixDate:''};
  if(!p.itemState) p.itemState={};
  if(!p.itemState[no]) p.itemState[no]={status:null,ngNote:'',fixDate:''};
  return p.itemState[no];
}
function setItemStatus(no,s){
  const p=currentProject(); if(!p) return;
  if(!p.itemState) p.itemState={};
  const st=getItemState(no);
  st.status=(st.status===s)?null:s;
  saveState();
  renderChecklist();
  renderNgList();
}
function setNgNote(no,v){
  const st=getItemState(no); st.ngNote=v; saveState();
}
function setFixDate(no,v){
  const st=getItemState(no); st.fixDate=v; saveState();
  renderChecklist();
  renderNgList();
}

// ========== フィルター ==========
function getFiltered(){
  const timing=document.getElementById('f-timing').value;
  const imp=document.getElementById('f-imp').value;
  const tgt=document.getElementById('f-target').value;
  const acc=document.getElementById('f-accident').value;
  const selMajors=getSelMajors();
  const selMinors=getSelMinors();
  return ALL_DATA.filter(d=>{
    if(selMajors.size>0 && !selMajors.has(d.major) && d.major!=='共通') return false;
    if(selMinors.size>0 && !selMinors.has(d.minor) && d.major!=='共通') return false;
    if(timing && d.timing!==timing) return false;
    if(imp && d.importance!==imp) return false;
    if(tgt && d.target!==tgt) return false;
    if(acc && d.accident!==acc) return false;
    const st=getItemState(d.no).status;
    if(showNgOnly && st!=='ng') return false;
    if(showUnchecked && st!==null) return false;
    return true;
  });
}

// ========== チェックリスト描画 ==========
function renderChecklist(){
  const filtered=getFiltered();
  const area=document.getElementById('checklist-area');
  const sr=document.getElementById('stats-row');
  const total=filtered.length;
  const ok=filtered.filter(d=>getItemState(d.no).status==='ok').length;
  const ng=filtered.filter(d=>getItemState(d.no).status==='ng').length;
  const na=filtered.filter(d=>getItemState(d.no).status==='na').length;

  sr.innerHTML=`
    <div class="stat"><div class="stat-v">${total}</div><div class="stat-l">対象</div></div>
    <div class="stat"><div class="stat-v ok">${ok}</div><div class="stat-l">OK</div></div>
    <div class="stat"><div class="stat-v ng">${ng}</div><div class="stat-l">NG</div></div>
    <div class="stat"><div class="stat-v na">${na}</div><div class="stat-l">該当なし</div></div>`;

  if(!total){
    area.innerHTML='<div class="empty">表示できる項目がありません。<br>「工種選択」タブで工種を選んでください。</div>';
    return;
  }

  const byAcc={};
  filtered.forEach(d=>{ if(!byAcc[d.accident]) byAcc[d.accident]=[]; byAcc[d.accident].push(d); });

  let html='<div class="panel">';
  Object.entries(byAcc).forEach(([acc,items])=>{
    const okC=items.filter(i=>getItemState(i.no).status==='ok').length;
    const ngC=items.filter(i=>getItemState(i.no).status==='ng').length;
    html+=`<div class="sec-hd"><span>■ ${acc}</span>
      <span class="sec-prog">
        <span class="p-ok">OK ${okC}</span>
        ${ngC>0?`<span class="p-ng">NG ${ngC}</span>`:''}
      </span></div>`;
    const byT={};
    items.forEach(d=>{ if(!byT[d.timing]) byT[d.timing]=[]; byT[d.timing].push(d); });
    ['作業前','作業中','作業後','管理体制'].forEach(t=>{
      if(!byT[t]) return;
      html+=`<div class="timing-hd">▼ ${t}</div>`;
      byT[t].forEach(d=>{
        const st=getItemState(d.no);
        const s=st.status;
        const cardCls=s==='ok'?'is-ok':s==='ng'?'is-ng':s==='na'?'is-na':'';
        const iconCls=s==='ok'?'ok':s==='ng'?'ng':s==='na'?'na':'';
        const iconTxt=s==='ok'?'✓':s==='ng'?'✗':s==='na'?'－':'';
        const tagCls=d.importance==='高'?'tag-h':'tag-m';

        const ngDetail=s==='ng'?`
          <div class="ng-box">
            <div class="ng-box-label">▼ 不適合の内容（具体的に記入）</div>
            <textarea class="ng-textarea" placeholder="例：3階東側足場の手すりが外れていた"
              onchange="setNgNote('${d.no}',this.value)">${escHtml(st.ngNote)}</textarea>
            <div class="fix-box" style="margin-top:8px">
              <div class="fix-box-label">▼ 改善完了日</div>
              <div class="fix-row">
                <input type="date" class="fix-date" value="${escHtml(st.fixDate)}"
                  onchange="setFixDate('${d.no}',this.value)">
                ${st.fixDate?`<span class="fix-done">改善済 ${st.fixDate}</span>`:''}
              </div>
            </div>
          </div>`:'';;

        html+=`<div class="check-card ${cardCls}">
          <div class="card-top">
            <div class="status-icon ${iconCls}">${iconTxt}</div>
            <div class="card-body">
              <div class="card-no">${d.no}</div>
              <div class="card-text">${d.text}</div>
              <div class="card-tags">
                <span class="tag ${tagCls}">重要度：${d.importance}</span>
                <span class="tag tag-t">対象：${d.target}</span>
                <span class="tag tag-t">${d.major}</span>
              </div>
            </div>
          </div>
          <div class="choice-row">
            <button class="choice-btn${s==='ok'?' sel-ok':''}" onclick="setItemStatus('${d.no}','ok')">✓ OK</button>
            <button class="choice-btn${s==='ng'?' sel-ng':''}" onclick="setItemStatus('${d.no}','ng')">✗ NG</button>
            <button class="choice-btn${s==='na'?' sel-na':''}" onclick="setItemStatus('${d.no}','na')">— 該当なし</button>
          </div>
          ${ngDetail}
        </div>`;
      });
    });
  });
  html+='</div>';
  area.innerHTML=html;
}

// ========== NG一覧描画 ==========
function renderNgList(){
  const el=document.getElementById('ng-list');
  const p=currentProject();
  if(!p){ el.innerHTML='<div class="ng-empty">工事が選択されていません</div>'; return; }
  const ngItems=ALL_DATA.filter(d=>getItemState(d.no).status==='ng');
  if(!ngItems.length){
    el.innerHTML='<div class="ng-empty">NG項目はありません ✓</div>';
    return;
  }
  el.innerHTML=ngItems.map(d=>{
    const st=getItemState(d.no);
    return `<div class="ng-summary-card">
      <div class="ng-s-hd">
        <span class="ng-s-no">${d.no}</span>
        <span class="ng-s-text">${d.text}</span>
      </div>
      <div class="ng-s-body">
        ${st.ngNote?`<div class="ng-s-note">📝 ${escHtml(st.ngNote)}</div>`:'<div class="ng-s-note" style="color:#bbb">（不適合内容未記入）</div>'}
        <div class="ng-s-fix">
          ${st.fixDate
            ?`<span class="fix-done">改善済 ${st.fixDate}</span>`
            :`<span style="color:#e85a30;font-weight:600;font-size:12px">⚠ 未改善</span>
               <input type="date" class="fix-date" style="flex:1;max-width:160px"
                 value="" onchange="setFixDate('${d.no}',this.value)" placeholder="改善完了日を入力">`
          }
        </div>
      </div>
    </div>`;
  }).join('');
}

// ========== アクション ==========
function checkAllOk(){
  const f=getFiltered(); f.forEach(d=>{ getItemState(d.no).status='ok'; });
  saveState(); renderChecklist(); renderNgList();
  showToast('全項目をOKにしました');
}
function resetAll(){
  if(!confirm('表示中の項目のチェックをリセットしますか？')) return;
  const f=getFiltered();
  const p=currentProject(); if(!p) return;
  f.forEach(d=>{ if(p.itemState) p.itemState[d.no]={status:null,ngNote:'',fixDate:''}; });
  saveState(); renderChecklist(); renderNgList();
  showToast('リセットしました');
}
function toggleNgOnly(){
  showNgOnly=!showNgOnly;
  if(showNgOnly) showUnchecked=false;
  document.getElementById('btn-ng-only').className='act-btn'+(showNgOnly?' active-filter-ng':'');
  document.getElementById('btn-unchecked').className='act-btn';
  renderChecklist();
}
function toggleUnchecked(){
  showUnchecked=!showUnchecked;
  if(showUnchecked) showNgOnly=false;
  document.getElementById('btn-unchecked').className='act-btn'+(showUnchecked?' active-filter':'');
  document.getElementById('btn-ng-only').className='act-btn';
  renderChecklist();
}

// ========== タブ ==========
function showTab(id){
  document.querySelectorAll('.tab-content').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el=>el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const idx={' tab-info':0,'tab-info':0,'tab-select':1,'tab-check':2,'tab-ng':3}[id]||0;
  document.querySelectorAll('.tab-btn')[idx]?.classList.add('active');
  if(id==='tab-check') renderChecklist();
  if(id==='tab-ng') renderNgList();
}

// ========== Excel出力 ==========
function exportExcel(){
  if(typeof XLSX==='undefined'){
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=doExport; document.head.appendChild(s);
  } else { doExport(); }
}

function doExport(){
  const p=currentProject();
  const info=p?.info||{};
  const filtered=getFiltered();
  const wb=XLSX.utils.book_new();

  // シート1: 工事情報
  const ws1=XLSX.utils.aoa_to_sheet([
    ['安全パトロールチェックシート'],[''],
    ['工事名称', info.name||''],
    ['工事場所', info.loc||''],
    ['パトロール日', info.date||''],
    ['作成者', info.author||''],
    ['パトロール員', info.patrol||''],
    ['当日の工事内容', info.work||''],
    ['作業員人数', info.workers?(info.workers+'名'):''],
    ['全体工事進捗率', info.progress?(info.progress+'%'):''],
    ['天気', info.weather||''],
    ['気温', info.temp?(info.temp+'℃'):''],
  ]);
  ws1['!cols']=[{wch:20},{wch:45}];
  ws1['!merges']=[{s:{r:0,c:0},e:{r:0,c:1}}];
  XLSX.utils.book_append_sheet(wb,ws1,'工事情報');

  // シート2: チェック結果全件
  const rows=[['No.','事故分類','タイミング','チェック内容','重要度','対象','大分類','中分類','確認結果','不適合内容','改善完了日']];
  filtered.forEach(d=>{
    const st=getItemState(d.no);
    const r=st.status==='ok'?'OK':st.status==='ng'?'NG':st.status==='na'?'該当なし':'未確認';
    rows.push([d.no,d.accident,d.timing,d.text,d.importance,d.target,d.major,d.minor,r,st.ngNote||'',st.fixDate||'']);
  });
  const ws2=XLSX.utils.aoa_to_sheet(rows);
  ws2['!cols']=[{wch:8},{wch:16},{wch:10},{wch:55},{wch:8},{wch:8},{wch:12},{wch:16},{wch:10},{wch:35},{wch:12}];
  XLSX.utils.book_append_sheet(wb,ws2,'チェック結果');

  // シート3: NG一覧
  const ngRows=[['No.','事故分類','タイミング','チェック内容','重要度','不適合内容','改善完了日','改善状況']];
  ALL_DATA.filter(d=>getItemState(d.no).status==='ng').forEach(d=>{
    const st=getItemState(d.no);
    ngRows.push([d.no,d.accident,d.timing,d.text,d.importance,st.ngNote||'',st.fixDate||'',st.fixDate?'改善済':'未改善']);
  });
  const ws3=XLSX.utils.aoa_to_sheet(ngRows);
  ws3['!cols']=[{wch:8},{wch:16},{wch:10},{wch:55},{wch:8},{wch:40},{wch:12},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws3,'NG一覧・改善記録');

  const fname=(info.name||'安全パトロール')+'_'+(info.date||new Date().toISOString().split('T')[0])+'.xlsx';
  XLSX.writeFile(wb,fname);
  showToast('Excelを出力しました');
}

// ========== ユーティリティ ==========
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}

init();
</script>
